<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GREEN API — макет</title>
  <style>
    :root{
      --bg:#fafafa;
      --line:#d7d7d7;
      --accent:#e8e8e8;
      --btn:#f4f4f4;
      --text:#333;
      --muted:#777;
      --radius:6px;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
    }

    /* контейнер страницы */
    .page {
      width:100%;
      max-width:1100px;
      margin:28px auto;
      padding:18px;
      box-sizing:border-box;
      border:1px solid var(--line);
      background:white;
      box-shadow:0 1px 0 rgba(0,0,0,0.02);
    }

    /* верхняя "браузерная" панель */
    .browser {
      height:46px;
      border:1px solid var(--line);
      border-radius:6px 6px 0 0;
      display:flex;
      align-items:center;
      gap:12px;
      padding:6px 12px;
      box-sizing:border-box;
      background:#fff;
      margin-bottom:20px;
    }

    .browser .dots {
      display:flex;
      gap:8px;
      align-items:center;
    }

    .dot {
      width:12px;
      height:12px;
      border-radius:50%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
    }
    .dot.red{ background:#ff6b6b; }
    .dot.yellow{ background:#ffcc5c; }
    .dot.green{ background:#4cd964; }

    .browser .tab {
      width:110px;
      height:20px;
      border:1px solid var(--line);
      border-bottom:0;
      border-radius:6px 6px 0 0;
      display:inline-block;
      margin-left:12px;
      transform:translateY(2px);
      background:linear-gradient(#fff,#fafafa);
    }

    .browser .controls {
      margin-left:16px;
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--muted);
    }

    .browser .address {
      flex:1;
      height:18px;
      margin-left:8px;
      border:1px solid var(--line);
      border-radius:8px;
      background:linear-gradient(#fff,#fbfbfb);
      padding:6px 10px;
      box-sizing:border-box;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
    }

    /* Основная область: две колонки */
    .main {
      display:flex;
      gap:20px;
    }

    /* Левая колонка — форма */
    .left {
      width:370px;
      box-sizing:border-box;
      padding:12px;
      border-right:1px solid var(--line);
    }

    .field {
      margin-bottom:18px;
    }

    label {
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    input[type="text"],
    textarea {
      width:100%;
      box-sizing:border-box;
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:6px;
      background:var(--accent);
      font-size:15px;
      color:var(--text);
      outline:none;
      transition:box-shadow .12s, border-color .12s;
    }

    input[type="text"]:focus,
    textarea:focus{
      border-color:#bfcfe6;
      box-shadow:0 0 0 3px rgba(180,200,255,0.08);
      background:white;
    }

    textarea {
      min-height:84px;
      resize:vertical;
    }

    .btn {
      display:block;
      width:100%;
      padding:14px 12px;
      margin-bottom:16px;
      border-radius:8px;
      border:1px solid var(--line);
      background:var(--btn);
      font-size:16px;
      text-align:center;
      cursor:pointer;
      color:var(--text);
      box-shadow:inset 0 -1px 0 rgba(0,0,0,0.02);
    }

    .btn:active{ transform:translateY(1px); }

    .small-input {
      width:100%;
      margin-bottom:12px;
    }

    /* Правая колонка — ответ */
    .right {
      flex:1;
      padding:12px;
      box-sizing:border-box;
    }

    .panel {
      height:640px;
      border:1px solid var(--line);
      border-radius:6px;
      background:white;
      padding:12px;
      box-sizing:border-box;
      overflow:auto;
      font-family: "Courier New", Courier, monospace;
      font-size:13px;
      color:#1d1d1d;
      white-space:pre-wrap;
    }

    .panel .title {
      font-weight:600;
      margin-bottom:8px;
    }

    /* подпись внизу страницы */
    .footer {
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    @media (max-width:880px){
      .main{ flex-direction:column; }
      .left{ width:100%; border-right:0; border-bottom:1px solid var(--line); padding-bottom:18px; }
      .panel{ height:420px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="browser" aria-hidden="true">
      <div class="dots">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="tab"></div>
      <div class="controls">
        <div style="display:flex;gap:6px;align-items:center;">
          <svg width="18" height="14" viewBox="0 0 24 24" fill="none" style="opacity:.8"><path d="M15 18L9 12l6-6" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg width="18" height="14" viewBox="0 0 24 24" fill="none" style="opacity:.8"><path d="M9 18l6-6-6-6" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="address">https://green-api.example/</div>
      </div>
    </div>

    <div class="main">
      <div class="left">
        <div class="field">
          <label for="instanceId">instanceId</label>
          <input id="instanceId" type="text" placeholder="instanceId" value="">
        </div>

        <div class="field">
          <label for="apiToken">apiTokenInstance</label>
          <input id="apiToken" type="text" placeholder="apiTokenInstance" value="">
        </div>

        <button class="btn" id="btnGetSettings">getSettings</button>
        <button class="btn" id="btnGetState">getStateInstance</button>

        <hr style="border:none;border-top:1px dashed var(--line);margin:16px 0;opacity:.6" />

        <div class="field small-input">
          <label for="phoneSend">Телефон (phone)</label>
          <input id="phoneSend" type="text" placeholder="77771234567">
        </div>

        <div class="field">
          <label for="messageText">Текст сообщения (message)</label>
          <textarea id="messageText" placeholder="Hello World!">Hello World!</textarea>
        </div>

        <button class="btn" id="btnSendMessage">sendMessage</button>

        <hr style="border:none;border-top:1px dashed var(--line);margin:16px 0;opacity:.6" />

        <div class="field small-input">
          <label for="phoneFile">Телефон (phone)</label>
          <input id="phoneFile" type="text" placeholder="77771234567">
        </div>

        <div class="field small-input">
          <label for="fileUrl">URL файла (url)</label>
          <input id="fileUrl" type="text" placeholder="https://my.site.com/img/photo.png">
        </div>

        <button class="btn" id="btnSendFile">sendFileByUrl</button>

      </div>

      <div class="right">
        <div class="panel" id="responsePanel" aria-live="polite">
        </div>
      </div>
    </div>

    <div class="footer">
      <div>GREEN API © 2025</div>
      <div style="font-size:12px;color:var(--muted)">Макет: форма + панель ответа</div>
    </div>
  </div>

  
  <script>
    function setResponse(obj){
      const panel = document.getElementById('responsePanel');
      panel.innerText = JSON.stringify(obj);
    }

    function getField(id){ return document.getElementById(id).value.trim(); }

    document.getElementById('btnGetSettings').addEventListener('click', function(){
      const instanceId = getField('instanceId') || 'instanceId_placeholder';
      const token = getField('apiToken') || 'apiToken_placeholder';
      fetch(`https://green-api-back-production.up.railway.app/account/settings?idInstance=${instanceId}&apiTokenInstance=${token}`)
        .then(response => {
        return response.json();
        })
        .then(data => {
            setResponse(data);
        })
        .catch(error => console.error('Error:', error));
    });

    document.getElementById('btnGetState').addEventListener('click', function(){
      const instanceId = getField('instanceId') || 'instanceId_placeholder';
       const token = getField('apiToken') || 'apiToken_placeholder';
      fetch(`https://green-api-back-production.up.railway.app/account/instanceState?idInstance=${instanceId}&apiTokenInstance=${token}`)
        .then(response => {
        if (!response.ok) throw new Error('Network error');
        return response.json();
        })
        .then(data => {
            setResponse(data);
        })
        .catch(error => console.error('Error:', error));
    });

    document.getElementById('btnSendMessage').addEventListener('click', function(){
      const phone = getField('phoneSend') || '';
      const text = getField('messageText') || '';
      const instanceId = getField('instanceId') || 'instanceId_placeholder';
      const token = getField('apiToken') || 'apiToken_placeholder';

      fetch(`https://green-api-back-production.up.railway.app/sending/message?idInstance=${instanceId}&apiTokenInstance=${token}`, {method: 'POST', body: {
        chatId: `${phone}@c.us`,
        message: text
      }, headers: {
        "Content-Type": "application/json"
      }})
        .then(response => {
        if (!response.ok) throw new Error('Network error');
        return response.json();
        })
        .then(data => {
            setResponse(data);
        })
        .catch(error => console.error('Error:', error));
    });

    document.getElementById('btnSendFile').addEventListener('click', function(){
      const phone = getField('phoneFile') || '';
      const url = getField('fileUrl') || '';
      const instanceId = getField('instanceId') || 'instanceId_placeholder';
      const token = getField('apiToken') || 'apiToken_placeholder';
      fetch(`https://green-api-back-production.up.railway.app/sending/message?idInstance=${instanceId}&apiTokenInstance=${token}`, {method: 'POST', body: JSON.stringify({
        chatId: `${phone}@c.us`,
        fileUrl: url,
        filename: 'file'
      })})
        .then(response => {
        if (!response.ok) throw new Error('Network error');
        return response.json();
        })
        .then(data => {
            setResponse(data);
        })
        .catch(error => console.error('Error:', error));
    });
  </script>
</body>
</html>
